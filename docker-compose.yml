  admin:
    container_name: admin   # custom container name
    build:
      context: ./admin
      args:
        VITE_API_URL: "http://51.21.128.163:6000/api"
    ports:
      - "8080:8080"
    depends_on:
      - backend                    # wait for backend service
    restart: always               # auto restart container


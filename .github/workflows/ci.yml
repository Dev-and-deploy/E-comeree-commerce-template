name: build-and-deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend deps
        working-directory: server
        run: npm ci

      - name: Lint backend
        working-directory: server
        run: npm run lint -- --max-warnings=0

      - name: Install admin deps
        working-directory: admin
        run: npm ci

      - name: Lint admin
        working-directory: admin
        run: npm run lint -- --max-warnings=0

      - name: Build backend Docker image
        run: docker build -t backend ./server

      - name: Build admin Docker image
        run: docker build -t admin ./admin

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-lint   #  IMPORTANT

    steps:
      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Write SSH key
        run: |
          echo "${EC2_KEY}" > ec2_key.pem
          chmod 600 ec2_key.pem
        env:
          EC2_KEY: ${{ secrets.EC2_KEY }}

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          ssh -i ec2_key.pem ${EC2_USER}@${EC2_HOST} << 'EOF'
            set -e
            cd "${EC2_APP_DIR}" || exit 1

            echo "Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            echo "Rebuilding containers..."
            docker compose up -d --build

            echo "Cleaning old images..."
            docker image prune -f

            echo "Running containers:"
            docker compose ps
          EOF